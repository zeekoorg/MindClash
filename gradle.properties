# تخصيص 4 جيجابايت من الرام لتسريع البناء (ممتاز جداً)
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# تفعيل مكتبات أندرويد الحديثة (AndroidX)
android.useAndroidX=true

# نمط كتابة كوتلن الرسمي
kotlin.code.style=official

# معرفات الموارد (Resource IDs)
android.nonFinalResIds=false

# 🚀 إضافات السيرفر لتسريع استخراج الـ APK (مهمة جداً لـ GitHub Actions)
org.gradle.parallel=true
org.gradle.caching=true
