name: Manual Android Build 🚀

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 جلب الأكواد من المستودع
        uses: actions/checkout@v4

      - name: ☕ تهيئة بيئة جافا (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: ⚙️ توليد ملفات الجرادل الأساسية
        run: gradle wrapper --gradle-version 8.9

      - name: 🔐 إعطاء صلاحية التشغيل لمحرك الجرادل
        run: chmod +x gradlew

      - name: 🔨 بناء التطبيق (نسخة Release غير موقعة)
        # تم التغيير هنا لاستخراج نسخة ريليس
        run: ./gradlew assembleRelease --no-daemon

      - name: 📤 رفع ملف الـ APK النهائي للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: MindClash-App-Unsigned
          # تم التغيير هنا ليلتقط ملف الـ APK من مجلد الـ release
          path: app/build/outputs/apk/release/*.apk
